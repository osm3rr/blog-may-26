{% extends '_base.html' %}

{% block content %}
    <h2>{{ blog.title }}</h2>
    <p><strong>Autor:</strong> {{ blog.author }}</p>
    <p><strong>Fecha de creación:</strong> {{ blog.created_at }}</p>
    <div>
        {{ blog.content }}
    </div>
    <a href="{% url 'post-update' blog.pk %}">Editar publicación</a>
    <a href="{% url 'post-delete' blog.pk %}">Eliminar publicación</a>
{% endblock content %}
