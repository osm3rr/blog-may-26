{% extends '_base.html' %}

{% block content %}
    <h2>Eliminar publicación</h2>
    <p>¿Estás seguro de que quieres eliminar la publicación "{{ blog.title }}"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Eliminar</button>
        <a href="{% url 'post-detail' blog.pk %}">Cancelar</a>
    </form>
{% endblock content %}
